# Cloudflare Pages config for sandbox.towles.dev.
#
# Deploys this directory as a static site with one Pages Function
# (functions/sandbox.html.ts) that applies per-request CSP headers.
#
# Requires `wrangler` (npx wrangler) plus a Cloudflare API token with
# Pages:Edit scope. See README.md for one-time setup steps.

name = "towles-sandbox-proxy"
compatibility_date = "2026-04-01"
pages_build_output_dir = "."
