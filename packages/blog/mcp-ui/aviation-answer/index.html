<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Aviation answer</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--mcp-ui-background, #fff);
        color: var(--mcp-ui-foreground, #111);
      }
      body {
        font-family: var(--mcp-ui-font-family, system-ui, -apple-system, sans-serif);
        font-size: 14px;
        line-height: 1.45;
      }
      .wrap {
        padding: 1rem 1.25rem 1.5rem;
      }
      .loading {
        padding: 1.25rem;
        text-align: center;
        color: var(--mcp-ui-muted, #6b7280);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
      }
      .loading-spinner {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid currentColor;
        border-top-color: transparent;
        animation: aa-spin 0.8s linear infinite;
      }
      @keyframes aa-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app" data-testid="aviation-answer-app">
      <div class="wrap">
        <div class="loading" data-testid="aviation-loading">
          <span class="loading-spinner" aria-hidden="true"></span>
          <span>Running query against DuckDB…</span>
        </div>
      </div>
    </div>
    <script type="module" src="./aviation-answer.ts"></script>
  </body>
</html>
