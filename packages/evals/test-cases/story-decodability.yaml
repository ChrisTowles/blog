# Decodability Tests for Story Generation
# Validates phonics phase accuracy, reading level, and word count constraints

# Phase 1 — CVC words (sat, pin, mat, dog)
- description: 'Phase 1: animals theme produces decodable text'
  vars:
    phase: 1
    theme: 'animals'
  assert:
    - type: is-json
      metric: ValidJSON
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.decodabilityScore >= 0.90;
      metric: DecodabilityScore
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.fleschKincaid >= 0 && data.fleschKincaid <= 5;
      metric: FleschKincaid
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.wordCount >= 40 && data.wordCount <= 120;
      metric: WordCount
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return typeof data.title === 'string' && data.title.trim().length > 0;
      metric: TitlePresent

