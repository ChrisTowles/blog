name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: blog-towles-production
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: blog
  IMAGE_BASE: us-central1-docker.pkg.dev/blog-towles-production/containers/blog

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit Tests
        run: pnpm test -- --run

      - name: Run Migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: Integration Tests
        run: pnpm test:integration -- --run
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        run: |
          DATE_TAG=$(date -u '+%Y-%m-%d-%H-%M')
          SHA_TAG=${GITHUB_SHA::7}
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/container/blog.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:${{ steps.tags.outputs.date_tag }}
            ${{ env.IMAGE_BASE }}:${{ steps.tags.outputs.sha_tag }}
            ${{ env.IMAGE_BASE }}:latest
          build-args: |
            GIT_SHA=${{ steps.tags.outputs.sha_tag }}
            BUILD_TAG=${{ steps.tags.outputs.date_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.CLOUD_RUN_SERVICE }} \
            --image=${{ env.IMAGE_BASE }}:${{ steps.tags.outputs.date_tag }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }}

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://chris.towles.dev)
          echo "Health check status: ${STATUS}"
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::Health check returned ${STATUS}, expected 200"
          fi
