name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-pipeline
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  CLOUD_RUN_SERVICE: blog

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tags.outputs.date_tag }}
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse prod.tfvars for registry
        id: prod
        run: |
          TFVARS="infra/terraform/environments/prod.tfvars"
          get() { grep "^$1" "$TFVARS" | sed 's/.*= *"\(.*\)"/\1/'; }
          CONTAINER_IMAGE=$(get container_image)
          echo "project_id=$(get project_id)" >> "$GITHUB_OUTPUT"
          echo "gtag_id=$(get gtag_id)" >> "$GITHUB_OUTPUT"
          echo "mcp_sandbox_url=$(get mcp_sandbox_url)" >> "$GITHUB_OUTPUT"
          echo "region=$(echo "$CONTAINER_IMAGE" | sed 's/-docker\.pkg\.dev.*//')" >> "$GITHUB_OUTPUT"
          echo "image_base=$(echo "$CONTAINER_IMAGE" | sed 's/:[^/]*$//')" >> "$GITHUB_OUTPUT"

      - name: Parse staging.tfvars for registry
        id: staging
        run: |
          TFVARS="infra/terraform/environments/staging.tfvars"
          get() { grep "^$1" "$TFVARS" | sed 's/.*= *"\(.*\)"/\1/'; }
          CONTAINER_IMAGE=$(get container_image)
          echo "project_id=$(get project_id)" >> "$GITHUB_OUTPUT"
          echo "region=$(echo "$CONTAINER_IMAGE" | sed 's/-docker\.pkg\.dev.*//')" >> "$GITHUB_OUTPUT"
          echo "image_base=$(echo "$CONTAINER_IMAGE" | sed 's/:[^/]*$//')" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ steps.prod.outputs.region }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        run: |
          DATE_TAG=$(date -u '+%Y-%m-%d-%H-%M')
          SHA_TAG=${GITHUB_SHA::7}
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/container/blog.Dockerfile
          push: true
          tags: |
            ${{ steps.prod.outputs.image_base }}:${{ steps.tags.outputs.date_tag }}
            ${{ steps.prod.outputs.image_base }}:${{ steps.tags.outputs.sha_tag }}
            ${{ steps.prod.outputs.image_base }}:latest
            ${{ steps.staging.outputs.image_base }}:${{ steps.tags.outputs.date_tag }}
            ${{ steps.staging.outputs.image_base }}:${{ steps.tags.outputs.sha_tag }}
            ${{ steps.staging.outputs.image_base }}:latest
          build-args: |
            GIT_SHA=${{ steps.tags.outputs.sha_tag }}
            BUILD_TAG=${{ steps.tags.outputs.date_tag }}
            NUXT_PUBLIC_GTAG_ID=${{ steps.prod.outputs.gtag_id }}
            NUXT_PUBLIC_MCP_SANDBOX_URL=${{ steps.prod.outputs.mcp_sandbox_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse staging.tfvars
        id: tfvars
        run: |
          TFVARS="infra/terraform/environments/staging.tfvars"
          get() { grep "^$1" "$TFVARS" | sed 's/.*= *"\(.*\)"/\1/'; }
          CONTAINER_IMAGE=$(get container_image)
          echo "project_id=$(get project_id)" >> "$GITHUB_OUTPUT"
          echo "site_url=$(get site_url)" >> "$GITHUB_OUTPUT"
          echo "region=$(echo "$CONTAINER_IMAGE" | sed 's/-docker\.pkg\.dev.*//')" >> "$GITHUB_OUTPUT"
          echo "image_base=$(echo "$CONTAINER_IMAGE" | sed 's/:[^/]*$//')" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Wake up Cloud SQL instance
        run: |
          INSTANCE="blog-towles-staging-db"
          PROJECT="${{ steps.tfvars.outputs.project_id }}"
          STATE=$(gcloud sql instances describe "$INSTANCE" --project="$PROJECT" --format='value(state)')
          echo "Cloud SQL state: ${STATE}"
          if [ "$STATE" != "RUNNABLE" ]; then
            # --async: a cold start after the cost kill-switch stop can take
            # well over gcloud's ~10 min built-in operation-wait, which would
            # fail this step and abort the pipeline. Dispatch and poll state
            # ourselves instead. A patch may already be in flight from a
            # prior run, so a non-zero exit here is non-fatal.
            echo "Requesting Cloud SQL start (async)..."
            gcloud sql instances patch "$INSTANCE" --activation-policy=ALWAYS \
              --project="$PROJECT" --async \
              || echo "patch dispatch non-zero (likely already starting) — will poll state"
          fi
          echo "Waiting for Cloud SQL to reach RUNNABLE (up to 25 min)..."
          for i in $(seq 1 100); do
            STATE=$(gcloud sql instances describe "$INSTANCE" --project="$PROJECT" --format='value(state)' 2>/dev/null || echo UNKNOWN)
            if [ "$STATE" = "RUNNABLE" ]; then
              echo "Cloud SQL RUNNABLE after ~$((i * 15))s"
              break
            fi
            echo "  [$((i * 15))s] state=${STATE}"
            sleep 15
          done
          if [ "$STATE" != "RUNNABLE" ]; then
            echo "::error::Cloud SQL did not reach RUNNABLE in time (state=${STATE})"
            exit 1
          fi
          # RUNNABLE precedes actually accepting connections. The container
          # runs DB migrations on boot and exits(1) on ECONNREFUSED, so give
          # Postgres time to start serving before the Cloud Run rollout.
          echo "Cloud SQL RUNNABLE; allowing Postgres to accept connections..."
          sleep 60

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.CLOUD_RUN_SERVICE }} \
            --image=${{ steps.tfvars.outputs.image_base }}:${{ needs.build.outputs.image_tag }} \
            --region=${{ steps.tfvars.outputs.region }} \
            --project=${{ steps.tfvars.outputs.project_id }}

      - name: Smoke test staging
        run: |
          URL="${{ steps.tfvars.outputs.site_url }}"
          # gcloud run services update returns when the revision is created,
          # not when it serves traffic; first request also pays cold start +
          # the boot DB migration. Retry instead of a single shot.
          echo "Smoke testing ${URL} (retry up to ~4 min)..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$URL" || echo 000)
            echo "  [attempt $i] HTTP ${STATUS}"
            if [ "$STATUS" -eq 200 ]; then
              echo "Staging healthy."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Staging smoke test failed — last status ${STATUS}"
          exit 1

  deploy-prod:
    name: Deploy Production
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse prod.tfvars
        id: tfvars
        run: |
          TFVARS="infra/terraform/environments/prod.tfvars"
          get() { grep "^$1" "$TFVARS" | sed 's/.*= *"\(.*\)"/\1/'; }
          CONTAINER_IMAGE=$(get container_image)
          echo "project_id=$(get project_id)" >> "$GITHUB_OUTPUT"
          echo "site_url=$(get site_url)" >> "$GITHUB_OUTPUT"
          echo "region=$(echo "$CONTAINER_IMAGE" | sed 's/-docker\.pkg\.dev.*//')" >> "$GITHUB_OUTPUT"
          echo "image_base=$(echo "$CONTAINER_IMAGE" | sed 's/:[^/]*$//')" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.CLOUD_RUN_SERVICE }} \
            --image=${{ steps.tfvars.outputs.image_base }}:${{ needs.build.outputs.image_tag }} \
            --region=${{ steps.tfvars.outputs.region }} \
            --project=${{ steps.tfvars.outputs.project_id }}

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' ${{ steps.tfvars.outputs.site_url }})
          echo "Production health check status: ${STATUS}"
          if [ "$STATUS" -ne 200 ]; then
            echo "::warning::Production health check returned ${STATUS}, expected 200"
          fi
