name: Prompt Eval

on:
  pull_request:
    paths:
      - 'packages/evals/**'
      - 'packages/blog/server/utils/ai/**'
      - 'packages/blog/server/api/chats/**'
      - 'packages/blog/server/api/artifacts/**'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: prompt-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @chris-towles/evals test

  full-eval:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @chris-towles/evals eval:all
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
