<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="noindex,nofollow" />
    <!--
      CSP is set via HTTP headers by the h3 service at ../server.ts
      (based on the ?csp= query param). The inner iframe inherits this CSP
      because the sandbox uses document.write() to populate it
      (same-document inheritance).
    -->
    <title>MCP-UI Sandbox Proxy</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100vh;
        width: 100vw;
        background-color: transparent;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      * {
        box-sizing: border-box;
      }
      iframe {
        background-color: transparent;
        border: 0 none transparent;
        padding: 0;
        overflow: hidden;
        flex-grow: 1;
        color-scheme: inherit;
      }
    </style>
  </head>
  <body>
    <script type="module" src="/sandbox.js"></script>
  </body>
</html>
